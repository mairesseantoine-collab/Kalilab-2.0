services:
  # ── Backend FastAPI ─────────────────────────────────────────────────────────
  - type: web
    name: kalilab-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: kalilab-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 480
      - key: S3_ENDPOINT
        value: ""
      - key: S3_BUCKET
        value: kalilab-docs
      - key: S3_ACCESS_KEY
        value: ""
      - key: S3_SECRET_KEY
        value: ""
    healthCheckPath: /health

  # ── Frontend React ──────────────────────────────────────────────────────────
  - type: web
    name: kalilab-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    rootDir: frontend
    envVars:
      - key: VITE_API_URL
        value: https://kalilab-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

# ── Base de données PostgreSQL ─────────────────────────────────────────────────
databases:
  - name: kalilab-db
    plan: free
    databaseName: kalilab
    user: kalilab
