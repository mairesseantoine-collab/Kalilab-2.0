version: "3.9"

services:
  # PostgreSQL database
  db:
    image: postgres:15-alpine
    container_name: kalilab_db
    environment:
      POSTGRES_USER: kalilab
      POSTGRES_PASSWORD: kalilab
      POSTGRES_DB: kalilab
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kalilab"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # MinIO object storage (S3-compatible)
  minio:
    image: minio/minio:latest
    container_name: kalilab_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Alembic migrations (runs once on startup)
  migrate:
    build: .
    container_name: kalilab_migrate
    command: ["alembic", "upgrade", "head"]
    environment:
      DATABASE_URL: postgresql+asyncpg://kalilab:kalilab@db:5432/kalilab
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  # FastAPI backend
  api:
    build: .
    container_name: kalilab_api
    environment:
      DATABASE_URL: postgresql+asyncpg://kalilab:kalilab@db:5432/kalilab
      SECRET_KEY: "${SECRET_KEY:-change-me-in-production}"
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: kalilab-docs
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    volumes:
      - ./:/app  # dev hot-reload (remove in production)

volumes:
  postgres_data:
  minio_data:
