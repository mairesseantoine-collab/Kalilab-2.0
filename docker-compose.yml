version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: kalilab-postgres
    environment:
      POSTGRES_DB: kalilab
      POSTGRES_USER: kalilab
      POSTGRES_PASSWORD: kalilab2024
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kalilab"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kalilab-net

  minio:
    image: minio/minio:latest
    container_name: kalilab-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin2024
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - kalilab-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kalilab-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://kalilab:kalilab2024@postgres:5432/kalilab
      SECRET_KEY: kalilab-secret-key-change-in-production-2024
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 480
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: kalilab-docs
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin2024
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - kalilab-net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kalilab-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - kalilab-net
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:

networks:
  kalilab-net:
    driver: bridge
